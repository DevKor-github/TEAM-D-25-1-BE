name: Build Server

on:
  push:
    branches:
      - main # 또는 원하는 브랜치 이름
      - ci/*
      - develop
  pull_request:
    branches:
      - main # 또는 원하는 브랜치 이름
      - ci/*

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v2
        id: docker_build
        with:
          file: ./Dockerfile
          push: true
          tags: ghcr.io/juwoong/groo-develop:latest

      - name: Discord Notification
        uses: juwoong/action-discord-webhook@v1.0.1
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          short_sha: ${{ steps.docker_build.outputs.short_sha }}
          image_name: ghcr.io/juwoong/groo-develop:latest
